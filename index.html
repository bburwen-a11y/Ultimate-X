const evaluateHand = (cards, gameType, payTable) => {
if (cards.length !== 5) return { hand: ‘Incomplete’, payout: 0 };
const isDeuces = gameType === ‘Deuces Wild’ || gameType === ‘Deuces Bonus’;
const deuceCount = isDeuces ? cards.filter(c => c.rank === ‘2’).length : 0;
const rankCounts = {}, suitCounts = {}, rankValues = [];
cards.forEach(card => {
if (isDeuces && card.rank === ‘2’) return;
rankCounts[card.rank] = (rankCounts[card.rank] || 0) + 1;
suitCounts[card.suit] = (suitCounts[card.suit] || 0) + 1;
rankValues.push(RANK_VALUES[card.rank]);
});
const counts = Object.values(rankCounts).sort((a, b) => b - a);

rankValues.sort((a, b) => a - b);

if (deuceCount === 0) {
const u = […new Set(rankValues)].sort((a,b)=>a-b);
if (u.length === 5) {
if (u[4]-u[0] === 4) isStraight = true;
if (u[0]===2&&u[1]===3&&u[2]===4&&u[3]===5&&u[4]===14) isStraight = true;
}
} else {
const nonD = rankValues.filter(v => v !== 2);
const uniq = […new Set(nonD)].sort((a,b)=>a-b);
if (uniq.length + deuceCount === 5) {
const gaps = [];
for (let i = 1; i < uniq.length; i++) gaps.push(uniq[i]-uniq[i-1]-1);
const totalGaps = gaps.reduce((a,b)=>a+b,0);
if (uniq[0]===14 || uniq[uniq.length-1]===14) {
if (uniq.some(v=>v<=5) && totalGaps<=deuceCount) isStraight=true;
}
if (!isStraight) {
const span = uniq[uniq.length-1]-uniq[0];
if (span<=4 && totalGaps<=deuceCount) isStraight=true;
}
}
}
const maxCount = (counts[0]||0) + deuceCount;
const secondCount = counts[1]||0;
const hasNaturalRoyal = !isDeuces && isFlush && isStraight && rankValues.includes(14) && rankValues.includes(13);
let hasWildRoyal = false;
if (isDeuces && deuceCount>0 && isFlush && isStraight) {
const royalRanks=[10,11,12,13,14];
const nonD = rankValues.filter(v=>v!==2);
if (nonD.every(v=>royalRanks.includes(v)) && nonD.length+deuceCount===5) hasWildRoyal=true;
}
if (isDeuces) {
if (deuceCount===4) {
const k=cards.find(c=>c.rank!==‘2’);
if (k&&k.rank===‘A’) return {hand:‘Four Deuces + Ace’,payout:payTable[‘Four Deuces + Ace’]||0};

const r=Object.keys(rankCounts).find(r=>rankCounts[r]+deuceCount===5);
if (r===‘A’) return {hand:‘Five Aces’,payout:payTable[‘Five Aces’]||0};
if ([‘3’,‘4’,‘5’].includes(r)) return {hand:‘Five 3-5’,payout:payTable[‘Five 3-5’]||0};
return {hand:‘Five 6-K’,payout:payTable[‘Five 6-K’]||0};
}
if (isFlush&&isStraight) return {hand:‘Straight Flush’,payout:payTable[‘Straight Flush’]||0};
if (maxCount===4) return {hand:‘Four of a Kind’,payout:payTable[‘Four of a Kind’]||0};
if (maxCount===3&&secondCount===2) return {hand:‘Full House’,payout:payTable[‘Full House’]||0};

if (maxCount===4) {

const analyzeStrategy = (cards, gameType, payTable, playMode=1) => {

}

<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Poker Test NoLoop</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{background:#1a1a2e;color:#fff;padding:20px;font-family:system-ui}
button{padding:15px;background:#9333ea;color:#fff;border:none;border-radius:8px;font-size:18px;cursor:pointer;margin:5px}
.item{display:inline-block;padding:10px;background:#374151;margin:5px;border-radius:5px}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.onerror=function(m,u,l){alert('ERROR: '+m+' Line:'+l);return false;};
</script>
<script type="text/babel">
const{useState}=React;

function createItems(){
return Array(5).fill(0).map((x,i)=>({id:i,name:’Item ’+i}));
}

function App(){
const[items,setItems]=useState([]);
const handleClick=()=>{
setItems(createItems());
};
return <div style={{textAlign:‘center’,marginTop:‘50px’}}>

<h1>No For-Loop Test</h1>
<div>
{items.map((item,i)=>(
<div key={i} className="item">{item.name}</div>
))}
</div>
<button onClick={handleClick}>Create Items</button>
</div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

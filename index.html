<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ultimate X">
<title>⚡ Ultimate X Poker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; }
</style>
</head>
<body>
<div id="root"><p id="status">Loading React...</p></div>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script>
document.getElementById('status').textContent = 'React loaded: ' + (typeof React !== 'undefined') + ', ReactDOM: ' + (typeof ReactDOM !== 'undefined');

try {
var root = ReactDOM.createRoot(document.getElementById(‘root’));
root.render(React.createElement(‘p’, null, ‘React is working!’));
} catch(e) {
document.getElementById(‘root’).textContent = ’React error: ’ + e.message;
}
</script>

</body>
</html>

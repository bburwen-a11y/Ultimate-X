                    {(ultimateXMultipliers[handIndex]||1)>1 && !results[handIndex] && (
                      <span className="multiplier-badge animate-pulse" style={{fontSize:isCompact?'0.5rem':'0.625rem',padding:isCompact?'2px 4px':'2px 6px'}}>{ultimateXMultipliers[handIndex]}X ACTIVE</span>
                    )}
                    {results[handIndex] && (
                      <span className="multiplier-badge" style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)',fontSize:isCompact?'0.5rem':'0.625rem',padding:isCompact?'2px 4px':'2px 6px'}}>NEXT: {ultimateXMultipliers[handIndex]}X</span>
                    )}
                  </div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'0.25rem',marginBottom:'0.5rem'}}>
                  {hand.map((card, cardIndex) => {
                    const isRed = card.suit === '♥' || card.suit === '♦';
                    const isHoldable = handIndex === 0 && isDealt && results.length === 0;
                    const isHeld = held[handIndex]?.[cardIndex];
                    const cardFontSize = isCompact ? 9 : 13;
                    const suitFontSizeSmall = isCompact ? 7 : 11;
                    const centerSuitSize = isCompact ? 18 : 28;
                    return (
                      <div key={cardIndex} onClick={() => isHoldable && toggleHold(handIndex, cardIndex)}
                        style={{aspectRatio:'2.5/3.5',borderRadius:isCompact?4:8,background:'#fff',color:isRed?'#dc2626':'#111827',boxShadow:isHeld?'0 0 0 3px #FFD700, 0 8px 20px rgba(255,215,0,0.5)':'0 4px 10px rgba(0,0,0,0.4)',transform:isHeld?'translateY(-10px)':'none',transition:'all 0.2s ease',cursor:isHoldable?'pointer':'default',position:'relative',display:'flex',flexDirection:'column',justifyContent:'space-between',padding:isCompact?'2px 3px':'4px 5px',userSelect:'none',flexShrink:0}}>
                        <div style={{fontSize:cardFontSize,fontWeight:800,lineHeight:1,display:'flex',flexDirection:'column',alignItems:'flex-start',gap:isCompact?0:1,color:isRed?'#dc2626':'#000000'}}>
                          <span>{card.rank}</span>
                          <span style={{fontSize:suitFontSizeSmall}}>{card.suit}</span>
                        </div>
                        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:centerSuitSize,lineHeight:1,pointerEvents:'none',color:isRed?'#dc2626':'#000000'}}>
                          {card.suit}
                        </div>
                        <div style={{fontSize:cardFontSize,fontWeight:800,lineHeight:1,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:isCompact?0:1,transform:'rotate(180deg)',color:isRed?'#dc2626':'#000000'}}>
                          <span>{card.rank}</span>
                          <span style={{fontSize:suitFontSizeSmall}}>{card.suit}</span>
                        </div>
                        {isHeld && handIndex === 0 && (
                          <div style={{position:'absolute',bottom:-18,left:0,right:0,textAlign:'center',fontSize:10,fontWeight:800,color:'#FFD700',letterSpacing:1}}>HOLD</div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {results[handIndex] && (
                  <div style={{textAlign:'center',marginTop:isCompact?'0.25rem':'0.5rem'}}>
                    <div style={{fontWeight:700,color:'#FBBF24',fontSize:isCompact?'0.625rem':'0.875rem',marginBottom:isCompact?'0.125rem':'0.25rem'}}>{results[handIndex].hand}</div>
                    {results[handIndex].payout > 0 ? (
                      <div style={{display:'flex',flexDirection:'column',gap:'0.125rem',alignItems:'center'}}>
                        <div style={{fontSize:isCompact?'0.5rem':'0.75rem',color:'rgba(255,255,255,0.6)'}}>
                          {results[handIndex].payout} x 5
                          {results[handIndex].multiplier > 1 && <span style={{color:'#FF6B6B',fontWeight:700,marginLeft:'0.25rem'}}>x {results[handIndex].multiplier}X</span>}
                        </div>
                        <div style={{color:'#10B981',fontWeight:800,fontSize:isCompact?'0.875rem':'1.125rem'}}>+{results[handIndex].winAmount}</div>
                      </div>
                    ) : (
                      <div style={{fontSize:isCompact?'0.5rem':'0.75rem',color:'rgba(255,255,255,0.4)'}}>No win</div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Strategy Warning Banner */}
        {warningMessage && (
          <div style={{margin:'0 0 20px 0',padding:'20px',background:'linear-gradient(135deg,#f59e0b,#dc2626)',borderRadius:'12px',border:'3px solid #fbbf24',boxShadow:'0 0 20px rgba(251,191,36,0.5)'}}>
            <div style={{textAlign:'center',color:'white'}}>
              <div style={{fontSize:'24px',fontWeight:'bold',marginBottom:'10px'}}>WARNING: STRATEGY MISTAKE</div>
              <div style={{fontSize:'16px',marginBottom:'8px'}}><strong>You held:</strong> {warningMessage.userCards}</div>
              <div style={{fontSize:'16px',marginBottom:'8px'}}><strong>Better play:</strong> {warningMessage.recommendedCards}</div>
              <div style={{fontSize:'16px',marginBottom:'8px'}}><strong>Expected Value:</strong> {warningMessage.ev}</div>
              <div style={{fontSize:'14px',marginTop:'12px',fontWeight:'bold'}}>Click DRAW again to proceed anyway.</div>
            </div>
          </div>
        )}

        {/* Active Multipliers Banner */}
        {!isDealt && ultimateXMultipliers.some(m => m > 1) && (
          <div style={{margin:'0 0 20px 0',padding:'16px',background:'linear-gradient(135deg,#10b981,#059669)',borderRadius:'12px',border:'2px solid #34d399',boxShadow:'0 0 15px rgba(16,185,129,0.4)'}}>
            <div style={{textAlign:'center',color:'white'}}>
              <div style={{fontSize:'16px',fontWeight:'bold',marginBottom:'10px'}}>ACTIVE MULTIPLIERS</div>
              <div style={{display:'grid',gridTemplateColumns:playMode===1?'1fr':playMode===3?'repeat(3,1fr)':playMode===5?'repeat(5,1fr)':'repeat(auto-fit,minmax(60px,1fr))',gap:'8px',maxWidth:'600px',margin:'0 auto'}}>
                {ultimateXMultipliers.map((mult, i) => (
                  <div key={i} style={{padding:'8px',background:mult>1?'rgba(251,191,36,0.3)':'rgba(255,255,255,0.15)',borderRadius:'8px',border:mult>1?'2px solid #fbbf24':'1px solid rgba(255,255,255,0.3)'}}>
                    <div style={{fontSize:'9px',marginBottom:'2px',opacity:0.8}}>Hand {i+1}</div>
                    <div style={{fontSize:mult>1?'22px':'16px',fontWeight:'bold',color:mult>1?'#fbbf24':'white'}}>{mult}X</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:'11px',marginTop:'10px',opacity:0.95,fontWeight:'bold'}}>Sum of Active Multipliers: {multiplier}X</div>
            </div>
          </div>
        )}

        {/* Action Buttons */}
        <div style={{display:'flex',gap:'0.75rem',justifyContent:'center',marginBottom:'1rem'}}>
          {!isDealt ? (
            <button onClick={deal} disabled={credits < betAmount} className="btn btn-primary" style={{fontSize:'1.125rem',padding:'0.75rem 2rem'}}>
              DEAL &mdash; {playMode > 1 ? `${playMode} x 5 = ` : ''}{betAmount} Credits
            </button>
          ) : (
            <button onClick={attemptDraw} className="btn btn-secondary" style={{fontSize:'1.125rem',padding:'0.75rem 2rem'}}>
              DRAW
            </button>
          )}
        </div>

        {playMode >= 5 && results.length > 0 && (
          <div style={{display:'flex',justifyContent:'center',marginBottom:'1rem'}}>
            <button onClick={() => setShowResults(!showResults)} className="btn btn-primary" style={{fontSize:'1rem',padding:'0.625rem 1.5rem',background:showResults?'linear-gradient(135deg,#6366f1,#8b5cf6)':'linear-gradient(135deg,#10b981,#059669)'}}>
              {showResults ? 'Hide All Results' : `See All ${playMode} Results`}
            </button>
          </div>
        )}
      </>
    ) : (
      <>
        {/* Analyzer Mode */}
        <div className="mb-4">

            {Object.keys(PAY_TABLES).map(game => (
              <button key={game} onClick={() => { setGameType(game); setPayTableVariant(Object.keys(PAY_TABLES[game])[0]); setStrategy(null); }} className={`btn-game ${gameType === game ? 'active' : ''}`}>
                {game}
              </button>
            ))}
          </div>

          <div style={{fontSize:'0.875rem',fontWeight:'600',marginBottom:'0.5rem',color:'#facc15'}}>PAY TABLE:</div>
          <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap',marginBottom:'1rem'}}>
            {Object.keys(PAY_TABLES[gameType]).map(variant => (
              <button key={variant} onClick={() => { if (payTableVariant === variant) { setShowPayTable(!showPayTable); } else { setPayTableVariant(variant); setStrategy(null); setShowPayTable(false); } }} className={`btn-game ${payTableVariant === variant ? 'active' : ''}`}>
                {variant}
              </button>
            ))}
          </div>

          <div style={{fontSize:'0.875rem',fontWeight:'600',marginBottom:'0.5rem',color:'#facc15'}}>ANALYZING FOR:</div>
          <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap',marginBottom:'1rem'}}>
            {[1, 3, 5, 10].map(mode => (
              <button key={mode} onClick={() => { setAnalyzerPlayMode(mode); setStrategy(null); }} className={`btn-game ${analyzerPlayMode === mode ? 'active' : ''}`} style={{minWidth:'80px'}}>
                {mode === 1 ? 'Single' : `${mode} Hands`}
              </button>
            ))}
          </div>

          <div style={{fontSize:'0.875rem',fontWeight:'600',marginBottom:'0.5rem',color:'#facc15'}}>ACTIVE MULTIPLIER:</div>
          <div style={{display:'flex',alignItems:'center',gap:'0.75rem',marginBottom:'1rem'}}>
            <input type="number" min={analyzerPlayMode} max={analyzerPlayMode*12} value={multiplierInput}
              onChange={e => { const val = parseInt(e.target.value,10); if (!isNaN(val)) { setMultiplierInput(String(val)); setMultiplier(val); setStrategy(null); } else if (e.target.value==='') setMultiplierInput(''); }}
              onBlur={e => { const val = parseInt(e.target.value,10); if (isNaN(val)||val<analyzerPlayMode) { setMultiplierInput(String(analyzerPlayMode)); setMultiplier(analyzerPlayMode); } }}
              className="px-3 py-2 bg-gray-700 text-white rounded text-center font-bold" style={{width:'80px',fontSize:'18px'}}
            />
            <span className="text-white text-lg">X</span>
          </div>

          <div style={{fontSize:'0.875rem',fontWeight:'600',marginBottom:'0.5rem',color:'#facc15'}}>SELECT 5 CARDS:</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'0.5rem',marginBottom:'1rem'}}>
            {analyzerCards.map((card, index) => {
              const isRed = card.suit === '♥' || card.suit === '♦';
              const isRecommended = strategy?.heldIndices.includes(index);
              return (
                <div key={index} onClick={() => removeAnalyzerCard(index)}
                  style={{aspectRatio:'2.5/3.5',borderRadius:8,background:'#fff',color:isRed?'#dc2626':'#111827',boxShadow:isRecommended?'0 0 0 3px #10b981, 0 4px 12px rgba(0,0,0,0.4)':'0 4px 10px rgba(0,0,0,0.4)',cursor:'pointer',position:'relative',display:'flex',flexDirection:'column',justifyContent:'space-between',padding:'4px 5px',userSelect:'none'}}>
                  <div style={{fontSize:13,fontWeight:800,lineHeight:1,display:'flex',flexDirection:'column',alignItems:'flex-start',gap:1}}>
                    <span>{card.rank}</span>
                    <span style={{fontSize:11}}>{card.suit}</span>
                  </div>
                  <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:28,lineHeight:1,pointerEvents:'none'}}>{card.suit}</div>
                  <div style={{fontSize:13,fontWeight:800,lineHeight:1,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1,transform:'rotate(180deg)'}}>
                    <span>{card.rank}</span>
                    <span style={{fontSize:11}}>{card.suit}</span>
                  </div>
                </div>
              );
            })}
            {Array(5 - analyzerCards.length).fill(null).map((_, i) => (
              <div key={`empty-${i}`} style={{aspectRatio:'2.5/3.5',borderRadius:8,background:'rgba(107,114,128,0.3)',border:'2px dashed rgba(255,255,255,0.1)'}}></div>
            ))}
          </div>

          <div style={{fontSize:'0.75rem',fontWeight:'600',marginBottom:'0.5rem',color:'#facc15'}}>DECK (tap to add / remove):</div>
          <div style={{maxHeight:145,overflowY:'auto',background:'rgba(0,0,0,0.35)',borderRadius:8,padding:'5px 3px'}}>
            {SUITS.map(suit => {
              const suitCards = RANKS.map(rank => ({ rank, suit, id: `${rank}${suit}` }));
              const isRed = suit === '♥' || suit === '♦';
              return (
                <div key={suit} style={{display:'flex',gap:2,marginBottom:3,alignItems:'center'}}>
                  <span style={{color:isRed?'#ef4444':'#e2e8f0',fontSize:11,fontWeight:700,width:12,flexShrink:0,textAlign:'center'}}>{suit}</span>
                  {suitCards.map(card => {
                    const isSelected = analyzerCards.some(c => c.id === card.id);
                    const isRemoved = removedCards.includes(card.id);
                    return (
                      <div key={card.id} onClick={() => {
                        if (isSelected) return;
                        if (isRemoved) { setRemovedCards(removedCards.filter(id => id !== card.id)); }
                        else if (analyzerCards.length < 5) { addAnalyzerCard(card); }
                        else { toggleCardRemoval(card.id); }
                      }}
                      style={{width:24,height:34,background:isRemoved?'#374151':isSelected?'#fef9c3':'#fff',borderRadius:3,boxShadow:isSelected?'0 0 0 2px #f59e0b':'0 2px 4px rgba(0,0,0,0.4)',cursor:isSelected?'default':'pointer',position:'relative',flexShrink:0,opacity:isRemoved?0.35:1,transition:'all 0.15s ease',display:'flex',flexDirection:'column',justifyContent:'space-between',padding:'2px 2px',color:isRemoved?'#6b7280':isRed?'#dc2626':'#111827'}}>
                        <div style={{fontSize:8,fontWeight:800,lineHeight:1,display:'flex',flexDirection:'column',alignItems:'flex-start',gap:0}}>
                          <span>{card.rank}</span>
                          <span style={{fontSize:7}}>{suit}</span>
                        </div>
                        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:12,lineHeight:1}}>{suit}</div>
                        <div style={{fontSize:8,fontWeight:800,lineHeight:1,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:0,transform:'rotate(180deg)'}}>
                          <span>{card.rank}</span>
                          <span style={{fontSize:7}}>{suit}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>

          <div style={{display:'flex',gap:'0.5rem',marginTop:'1rem'}}>
            <button onClick={analyzeHand} disabled={analyzerCards.length !== 5} className="btn btn-primary" style={{flex:1}}>ANALYZE</button>
            <button onClick={resetAnalyzer} className="btn-game">RESET</button>
          </div>

          {strategy && (
            <div style={{marginTop:'1rem',background:'rgba(0,0,0,0.4)',padding:'1rem',borderRadius:'0.5rem',backdropFilter:'blur(10px)'}}>
              <div style={{textAlign:'center',fontWeight:'bold',color:'#facc15',marginBottom:'0.5rem'}}>STRATEGY RECOMMENDATION</div>
              <div style={{textAlign:'center',marginBottom:'0.5rem'}}>
                <span style={{fontSize:'1.125rem',fontWeight:'bold',color:'#4ade80'}}>Expected Value: {strategy.ev.toFixed(2)}</span>
              </div>
              <div style={{textAlign:'center',fontSize:'0.875rem'}}>
                {strategy.heldIndices.length === 0 ? (
                  <span style={{color:'#f87171'}}>Discard all cards</span>
                ) : strategy.heldIndices.length === 5 ? (
                  <span style={{color:'#4ade80'}}>Hold all cards</span>
                ) : (
                  <span style={{color:'#60a5fa'}}>Hold cards: {strategy.heldIndices.map(i => i + 1).join(', ')}</span>
                )}
              </div>
            </div>
          )}
        </div>
      </>
    )}

    {/* Pay Table Modal */}
    {showPayTable && (
      <div onClick={() => setShowPayTable(false)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.85)',backdropFilter:'blur(8px)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
        <div onClick={e => e.stopPropagation()} style={{background:'linear-gradient(135deg,rgba(15,12,41,0.98),rgba(48,43,99,0.98))',borderRadius:16,padding:'1.5rem',maxWidth:500,width:'100%',maxHeight:'80vh',overflowY:'auto',border:'2px solid rgba(255,215,0,0.3)',boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
          <div style={{textAlign:'center',marginBottom:'1rem'}}>
            <h3 style={{color:'#FFD700',fontSize:'1.25rem',fontWeight:800,marginBottom:'0.25rem'}}>{gameType}</h3>
            <div style={{color:'rgba(255,255,255,0.6)',fontSize:'0.875rem'}}>{payTableVariant} Pay Table</div>
          </div>
          <div style={{background:'rgba(0,0,0,0.4)',borderRadius:12,padding:'0.75rem'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:'0.75rem',padding:'0.5rem',borderBottom:'2px solid rgba(255,215,0,0.3)',fontSize:'0.75rem',fontWeight:700,color:'#FFD700',marginBottom:'0.25rem'}}>
              <span>HAND</span>
              <span style={{textAlign:'right'}}>PAYOUT</span>
              <span style={{textAlign:'right'}}>ULT X</span>
            </div>
            {Object.entries(currentPayTable).map(([hand, payout]) => {
              const ultXMultiplier = ULTIMATE_X_MULTIPLIERS[gameType]?.[payTableVariant]?.[hand];
              const ultX = ultXMultiplier ? `${ultXMultiplier}X` : '--';
              return (
                <div key={hand} style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:'0.75rem',padding:'0.5rem',borderBottom:'1px solid rgba(255,255,255,0.1)',fontSize:'0.875rem'}}>
                  <span style={{color:'rgba(255,255,255,0.9)'}}>{hand}</span>
                  <span style={{color:'#FFD700',fontWeight:700,textAlign:'right'}}>{payout}</span>
                  <span style={{color:ultX!=='--'?'#FF6B6B':'rgba(255,255,255,0.3)',fontWeight:700,textAlign:'right',minWidth:36}}>{ultX}</span>
                </div>
              );
            })}
          </div>
          <div style={{textAlign:'center',marginTop:'1rem',fontSize:'0.75rem',color:'rgba(255,255,255,0.5)'}}>Payouts shown for 1 coin</div>
          <button onClick={() => setShowPayTable(false)} style={{width:'100%',marginTop:'1rem',padding:'0.75rem',background:'linear-gradient(135deg,#8B5CF6,#6366F1)',color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:'0.875rem',cursor:'pointer'}}>CLOSE</button>
        </div>
      </div>
    )}
  </div>
</div>

<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Poker Cards Test</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{background:#1a1a2e;color:#fff;padding:20px;font-family:system-ui}
.card{width:80px;height:110px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;margin:5px}
.cards{display:flex;justify-content:center;gap:10px;margin:20px}
button{padding:15px 30px;background:#9333ea;color:#fff;border:none;border-radius:8px;font-size:18px;cursor:pointer;margin:10px}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.onerror=function(m,u,l){alert('ERROR: '+m+' Line:'+l);return false;};
</script>
<script type="text/babel">
const{useState}=React;

const SUITS=[‘S’,‘H’,‘D’,‘C’];
const SUITNAMES={S:‘♠’,H:‘♥’,D:‘♦’,C:‘♣’};
const RANKS=[‘2’,‘3’,‘4’,‘5’,‘6’,‘7’,‘8’,‘9’,‘T’,‘J’,‘Q’,‘K’,‘A’];

function createDeck(){
const d=[];
for(let s of SUITS)for(let r of RANKS)d.push({rank:r,suit:s});
return d;
}

function shuffle(deck){
const n=[…deck];
for(let i=n.length-1;i>0;i–){
const j=Math.floor(Math.random()*(i+1));
[n[i],n[j]]=[n[j],n[i]];
}
return n;
}

function App(){
const[hand,setHand]=useState([]);

const deal=()=>{
const deck=shuffle(createDeck());
setHand([deck[0],deck[1],deck[2],deck[3],deck[4]]);
};

return <div style={{textAlign:‘center’,marginTop:‘30px’}}>

<h1>Card Display Test</h1>
<div className="cards">
{hand.map((c,i)=>(
<div 
key={i} 
className="card"
style={{color:(['H','D'].includes(c.suit)?'#dc2626':'#000000')}}
>
{c.rank}{SUITNAMES[c.suit]}
</div>
))}
</div>
<button onClick={deal}>DEAL 5 CARDS</button>
</div>;
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App/>);
</script>

</body>
</html>

<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Poker Mini</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{background:#1a1a2e;color:#fff;padding:20px;font-family:system-ui}button{padding:15px;background:#9333ea;color:#fff;border:none;border-radius:8px;cursor:pointer}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState}=React;
function App(){
const[msg,setMsg]=useState('Ready');
return <div style={{textAlign:'center',marginTop:'50px'}}>
<h1 style={{color:'#fbbf24'}}>Mini Poker</h1>
<p style={{fontSize:'24px',margin:'20px'}}>{msg}</p>
<button onClick={()=>setMsg('Button works!')}>Test</button>
</div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

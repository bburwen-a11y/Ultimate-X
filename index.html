<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nested Loop Test</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{background:#1a1a2e;color:#fff;padding:20px;font-family:system-ui}
button{padding:15px;background:#9333ea;color:#fff;border:none;border-radius:8px;font-size:18px;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.onerror=function(m,u,l){alert('ERROR: '+m+' Line:'+l);return false;};
</script>
<script type="text/babel">
const{useState}=React;
const SUITS=['S','H','D','C'];
const RANKS=['A','2','3'];
function makeDeck(){
const deck=[];
let count=0;
while(count<SUITS.length){
const suit=SUITS[count];
let r=0;
while(r<RANKS.length){
const rank=RANKS[r];
deck.push({rank:rank,suit:suit});
r=r+1;
}
count=count+1;
}
return deck.length+' cards in deck';
}
function App(){
const[msg,setMsg]=useState('Click button');
return <div style={{textAlign:'center',marginTop:'50px'}}>
<h1>Nested Loop Test</h1>
<p style={{fontSize:'24px',margin:'20px'}}>{msg}</p>
<button onClick={()=>setMsg(makeDeck())}>Make Deck</button>
</div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shuffle Test</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{background:#1a1a2e;color:#fff;padding:20px;font-family:system-ui}
button{padding:15px;background:#9333ea;color:#fff;border:none;border-radius:8px;font-size:18px;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.onerror=function(m,u,l){alert('ERROR: '+m+' Line:'+l);return false;};
</script>
<script type="text/babel">
const{useState}=React;
const SUITS=['S','H','D','C'];
const RANKS=['A','2','3','4','5'];
function makeDeck(){
const deck=[];
let s=0;
while(s<SUITS.length){
let r=0;
while(r<RANKS.length){
deck.push({rank:RANKS[r],suit:SUITS[s]});
r=r+1;
}
s=s+1;
}
return deck;
}
function shuffleDeck(deck){
const newDeck=[...deck];
let i=newDeck.length-1;
while(i>0){
const j=Math.floor(Math.random()*(i+1));
const temp=newDeck[i];
newDeck[i]=newDeck[j];
newDeck[j]=temp;
i=i-1;
}
return newDeck;
}
function App(){
const[msg,setMsg]=useState('Click to shuffle');
const handleShuffle=()=>{
const deck=makeDeck();
const shuffled=shuffleDeck(deck);
setMsg('First card: '+shuffled[0].rank+shuffled[0].suit);
};
return <div style={{textAlign:'center',marginTop:'50px'}}>
<h1>Shuffle Test</h1>
<p style={{fontSize:'24px',margin:'20px'}}>{msg}</p>
<button onClick={handleShuffle}>Shuffle Deck</button>
</div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

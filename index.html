const createDeck = () => {
  const deck = [];
  for (const suit of SUITS) {
    for (const rank of RANKS) {
      deck.push({ rank, suit, id: `${rank}${suit}` });
    }
  }
  return deck;
};

const shuffleDeck = (deck) => {
  const newDeck = [...deck];
  for (let i = newDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
  }
  return newDeck;
};

// Hand evaluation
const evaluateHand = (cards, gameType, payTable) => {
  if (cards.length !== 5) return { hand: 'Incomplete', payout: 0 };
  
  const isDeuces = gameType === 'Deuces Wild' || gameType === 'Deuces Bonus';
  const deuceCount = isDeuces ? cards.filter(c => c.rank === '2').length : 0;
  
  const rankCounts = {};
  const suitCounts = {};
  const rankValues = [];
  
  cards.forEach(card => {
    if (isDeuces && card.rank === '2') return;
    rankCounts[card.rank] = (rankCounts[card.rank] || 0) + 1;
    suitCounts[card.suit] = (suitCounts[card.suit] || 0) + 1;
    rankValues.push(RANK_VALUES[card.rank]);
  });
  
  const counts = Object.values(rankCounts).sort((a, b) => b - a);
  const isFlush = Object.values(suitCounts).some(count => count + deuceCount >= 5);
  
  rankValues.sort((a, b) => a - b);
  let isStraight = false;
  
  if (deuceCount === 0) {
    const uniqueRanks = [...new Set(rankValues)].sort((a, b) => a - b);
    if (uniqueRanks.length === 5) {
      // Regular straight: 5 consecutive ranks (e.g., 7-8-9-10-J)
      if (uniqueRanks[4] - uniqueRanks[0] === 4) isStraight = true;
      // Wheel (A-2-3-4-5): Check for exact ranks
      if (uniqueRanks[0] === 2 && uniqueRanks[1] === 3 && uniqueRanks[2] === 4 && uniqueRanks[3] === 5 && uniqueRanks[4] === 14) {
        isStraight = true;
      }
    }
  } else {
    const gaps = [];
    for (let i = 1; i < rankValues.length; i++) {
      gaps.push(rankValues[i] - rankValues[i-1] - 1);
    }
    if (rankValues[0] === 14 && rankValues[rankValues.length - 1] <= 5) {
      gaps.push(rankValues[0] - rankValues[rankValues.length - 1] - 1 + 13);
    }
    if (gaps.reduce((a, b) => a + b, 0) <= deuceCount) isStraight = true;
  }
  
  const maxCount = (counts[0] || 0) + deuceCount;
  const secondCount = (counts[1] || 0);
  
  const hasNaturalRoyal = !isDeuces && isFlush && isStraight && rankValues.includes(14) && rankValues.includes(13);
  
  // Wild Royal must be T-J-Q-K-A with deuces (not just any straight flush)
  let hasWildRoyal = false;
  if (isDeuces && deuceCount > 0 && isFlush && isStraight) {
    const royalRanks = [10, 11, 12, 13, 14]; // T, J, Q, K, A
    const nonDeuceRanks = rankValues.filter(v => v !== 2);
    // Check if all non-deuce cards are royal ranks
    const allRoyalRanks = nonDeuceRanks.every(v => royalRanks.includes(v));
    // Must have enough cards to make T-J-Q-K-A
    if (allRoyalRanks && nonDeuceRanks.length + deuceCount === 5) {
      hasWildRoyal = true;
    }
  }
  
  // Deuces Wild specific hands
  if (isDeuces) {
    if (deuceCount === 4) {
      const kicker = cards.find(c => c.rank !== '2');
      if (kicker && kicker.rank === 'A') return { hand: 'Four Deuces + Ace', payout: payTable['Four Deuces + Ace'] || 0 };
      return { hand: 'Four Deuces', payout: payTable['Four Deuces'] || 0 };
    }
    
    if (hasNaturalRoyal && deuceCount === 0) return { hand: 'Natural Royal', payout: payTable['Natural Royal'] || 0 };
    if (hasWildRoyal) return { hand: 'Wild Royal', payout: payTable['Wild Royal'] || 0 };
    
    // Five of a Kind
    if (maxCount === 5) {
      const rank = Object.keys(rankCounts).find(r => rankCounts[r] + deuceCount === 5);
      if (rank === 'A') return { hand: 'Five Aces', payout: payTable['Five Aces'] || 0 };
      if (['3', '4', '5'].includes(rank)) return { hand: 'Five 3-5', payout: payTable['Five 3-5'] || 0 };
      return { hand: 'Five 6-K', payout: payTable['Five 6-K'] || 0 };
    }
    
    if (isFlush && isStraight) return { hand: 'Straight Flush', payout: payTable['Straight Flush'] || 0 };
    if (maxCount === 4) return { hand: 'Four of a Kind', payout: payTable['Four of a Kind'] || 0 };
    if (maxCount === 3 && secondCount === 2) return { hand: 'Full House', payout: payTable['Full House'] || 0 };
    if (isFlush) return { hand: 'Flush', payout: payTable['Flush'] || 0 };
    if (isStraight) return { hand: 'Straight', payout: payTable['Straight'] || 0 };
    if (maxCount === 3) return { hand: 'Three of a Kind', payout: payTable['Three of a Kind'] || 0 };
    return { hand: 'Nothing', payout: 0 };
  }
  
  // Standard game hands
  if (hasNaturalRoyal) return { hand: 'Royal Flush', payout: payTable['Royal Flush'] || 0 };
  if (isFlush && isStraight) return { hand: 'Straight Flush', payout: payTable['Straight Flush'] || 0 };
  
  if (maxCount === 4) {
    const quadRank = Object.keys(rankCounts).find(r => rankCounts[r] === 4);
    const kicker = cards.find(c => c.rank !== quadRank);
    
    if (gameType === 'Triple Double Bonus') {
      if (quadRank === 'A' && kicker && ['2', '3', '4'].includes(kicker.rank)) {
        return { hand: 'Four Aces + 2-3-4', payout: payTable['Four Aces + 2-3-4'] || 0 };
      }
      if (['2', '3', '4'].includes(quadRank) && kicker && (kicker.rank === 'A' || ['2', '3', '4'].includes(kicker.rank))) {
        return { hand: 'Four 2-3-4 + A-2-3-4', payout: payTable['Four 2-3-4 + A-2-3-4'] || 0 };
      }
      if (quadRank === 'A') return { hand: 'Four Aces', payout: payTable['Four Aces'] || 0 };
      if (['2', '3', '4'].includes(quadRank)) return { hand: 'Four 2-3-4', payout: payTable['Four 2-3-4'] || 0 };
      return { hand: 'Four 5-K', payout: payTable['Four 5-K'] || 0 };
    }
    
    if (gameType === 'Double Double Bonus') {
      if (quadRank === 'A' && kicker && ['2', '3', '4'].includes(kicker.rank)) {
        return { hand: 'Four Aces + 2-4', payout: payTable['Four Aces + 2-4'] || 0 };
      }
      if (['2', '3', '4'].includes(quadRank) && kicker && (kicker.rank === 'A' || ['2', '3', '4'].includes(kicker.rank))) {
        return { hand: 'Four 2-4 + A-4', payout: payTable['Four 2-4 + A-4'] || 0 };
      }
      if (quadRank === 'A') return { hand: 'Four Aces', payout: payTable['Four Aces'] || 0 };
      if (['2', '3', '4'].includes(quadRank)) return { hand: 'Four 2-4', payout: payTable['Four 2-4'] || 0 };
      return { hand: 'Four 5-K', payout: payTable['Four 5-K'] || 0 };
    }
    
    if (gameType === 'Bonus Poker' || gameType === 'Double Bonus') {
      if (quadRank === 'A') return { hand: 'Four Aces', payout: payTable['Four Aces'] || 0 };
      if (['2', '3', '4'].includes(quadRank)) return { hand: 'Four 2-4', payout: payTable['Four 2-4'] || 0 };
      return { hand: 'Four 5-K', payout: payTable['Four 5-K'] || 0 };
    }
    
    return { hand: 'Four of a Kind', payout: payTable['Four of a Kind'] || 0 };
  }
  
  if (maxCount === 3 && secondCount === 2) return { hand: 'Full House', payout: payTable['Full House'] || 0 };
  if (isFlush) return { hand: 'Flush', payout: payTable['Flush'] || 0 };
  if (isStraight) return { hand: 'Straight', payout: payTable['Straight'] || 0 };
  if (maxCount === 3) return { hand: 'Three of a Kind', payout: payTable['Three of a Kind'] || 0 };
  if (maxCount === 2 && secondCount === 2) return { hand: 'Two Pair', payout: payTable['Two Pair'] || 0 };
  
  const pairRank = Object.keys(rankCounts).find(r => rankCounts[r] === 2);
  if (pairRank && ['J', 'Q', 'K', 'A'].includes(pairRank)) {
    return { hand: 'Jacks or Better', payout: payTable['Jacks or Better'] || 1 };
  }
  
  return { hand: 'Nothing', payout: 0 };
};

    if (isFlush) return { heldIndices: [0,1,2,3,4], ev: 6 };
    
    // Check for straight
    if (isStraight) return { heldIndices: [0,1,2,3,4], ev: 4 };
    
    if (maxCount === 3) {
      // Hold only the 3 cards that make trips (not kickers)
      const tripRank = Object.keys(rankCounts).find(r => rankCounts[r] === 3);
      const tripIndices = cards
        .map((c, i) => c.rank === tripRank ? i : -1)
        .filter(i => i >= 0);
      return { heldIndices: tripIndices, ev: 3 }; // Trips - hold 3 cards
    }
    if (pairRanks.length === 2) {
      console.log('TWO PAIR DETECTED');
      console.log('Cards:', cards.map(c => c.rank + c.suit));
      console.log('pairRanks:', pairRanks);
      
      // Hold only the 4 cards that make the two pairs (not the kicker)
      const twoPairIndices = cards
        .map((c, i) => pairRanks.includes(c.rank) ? i : -1)
        .filter(i => i >= 0);
      
      console.log('Returning indices:', twoPairIndices);
      return { heldIndices: twoPairIndices, ev: 2 }; // Two pair - hold 4 cards
    }
    
    // 3. High pair (J, Q, K, A) - HIGHER PRIORITY IN MULTI-PLAY
    const highPairRank = pairRanks.find(r => ['J', 'Q', 'K', 'A'].includes(r));
    if (highPairRank) {
      const pairIndices = cards.map((c, i) => c.rank === highPairRank ? i : -1).filter(i => i >= 0);
      const mult = multipliers['Jacks or Better'] || 2;
      const multiplayValue = isMultiPlay ? (mult - 1) * multiplierBoost * playMode : 0;
      return { heldIndices: pairIndices, ev: 0.82 + multiplayValue };
    }
    
    // 4. Four-card flush
    if (maxSuitCount === 4) {
      return { heldIndices: suitedIndices, ev: 0.6 };
    }
    
    // 5. Four-card straight (open-ended or one-gap with high cards)
    // Must have 4 unique ranks to make a straight
    const uniqueRankValues = [...new Set(rankValues)].sort((a, b) => a - b);
    if (uniqueRankValues.length >= 4) {
      // Check for 4 unique cards that can make a straight
      for (let i = 0; i <= uniqueRankValues.length - 4; i++) {
        const span = uniqueRankValues[i+3] - uniqueRankValues[i];
        const targetValues = [uniqueRankValues[i], uniqueRankValues[i+1], uniqueRankValues[i+2], uniqueRankValues[i+3]];
        
        // Open-ended straight (span = 3): ALWAYS good
        if (span === 3) {
          const straightIndices = cards.map((c, idx) => targetValues.includes(RANK_VALUES[c.rank]) ? idx : -1).filter(i => i >= 0).slice(0, 4);
          if (straightIndices.length === 4) {
            return { heldIndices: straightIndices, ev: 0.53 };
          }
        }
        
        // One-gap straight (span = 4): ONLY if it contains high cards (J, Q, K, A)
        if (span === 4) {
          const straightCards = cards.filter(c => targetValues.includes(RANK_VALUES[c.rank]));
          const hasHighCard = straightCards.some(c => ['J', 'Q', 'K', 'A'].includes(c.rank));
          
          if (hasHighCard) {
            const straightIndices = cards.map((c, idx) => targetValues.includes(RANK_VALUES[c.rank]) ? idx : -1).filter(i => i >= 0).slice(0, 4);
            if (straightIndices.length === 4) {
              return { heldIndices: straightIndices, ev: 0.53 };
            }
          }
        }
      }
    }
    
    // 6. Three-card royal flush
    if (maxSuitCount >= 3) {
      const suitedRanks = cards.filter(c => c.suit === maxSuit).map(c => c.rank);
      const royalRanks = ['T', 'J', 'Q', 'K', 'A'];
      const royalCount = suitedRanks.filter(r => royalRanks.includes(r)).length;
      if (royalCount >= 3) {
        const royalIndices = cards.map((c, i) => c.suit === maxSuit && royalRanks.includes(c.rank) ? i : -1).filter(i => i >= 0).slice(0, 3);
        return { heldIndices: royalIndices, ev: 0.52 };
      }
    }
    
    // 7. Low pair (2-10) - MORE VALUABLE IN MULTI-PLAY (guaranteed win on all hands)
    if (pairRanks.length > 0) {
      const lowPairRank = pairRanks[0];
      const pairIndices = cards.map((c, i) => c.rank === lowPairRank ? i : -1).filter(i => i >= 0);
      // In multi-play, low pairs become more attractive (guaranteed payout on all hands)
      const multiplayBonus = isMultiPlay ? 0.15 : 0;
      return { heldIndices: pairIndices, ev: 0.50 + multiplayBonus };
    }
    
    // 8. High cards (prioritize connected cards for straight potential)
    if (highCards.length >= 3) {
      // Check if we have 3+ high cards
      const highValues = highCards.map(c => RANK_VALUES[c.rank]).sort((a, b) => a - b);
      
      // Check for 3 connected high cards (e.g., J-Q-K)
      // Connected means max span of 2 (e.g., J=11, K=13, span=2)
      if (highValues.length >= 3) {
        const span = highValues[highValues.length - 1] - highValues[0];
        if (span <= 4) {
          // Hold all connected high cards (up to 3)
          return { heldIndices: highCardIndices.slice(0, 3), ev: 0.51 };
        }
      }
      
      // If not connected, check for suited high cards first
      const suitedHighCards = highCards.filter(c => c.suit === highCards[0].suit);
      if (suitedHighCards.length >= 2) {
        const indices = cards.map((c, i) => suitedHighCards.slice(0, 2).some(hc => hc.rank === c.rank && hc.suit === c.suit) ? i : -1).filter(i => i >= 0);
        return { heldIndices: indices, ev: 0.50 };
      }
      // Otherwise any two high cards
      return { heldIndices: highCardIndices.slice(0, 2), ev: 0.46 };
    }
    
    if (highCards.length === 2) {
      // Check for suited high cards first
      const suitedHighCards = highCards.filter(c => c.suit === highCards[0].suit);
      if (suitedHighCards.length >= 2) {
        const indices = cards.map((c, i) => suitedHighCards.slice(0, 2).some(hc => hc.rank === c.rank && hc.suit === c.suit) ? i : -1).filter(i => i >= 0);
        return { heldIndices: indices, ev: 0.50 };
      }
      // Otherwise any two high cards
      return { heldIndices: highCardIndices.slice(0, 2), ev: 0.46 };
    }
    
    // 9. Three-card straight flush (connected suited cards like Q-T-9 suited)
    if (maxSuitCount >= 3) {
      const suitedCards = cards.filter(c => c.suit === maxSuit);
      const suitedValues = suitedCards.map(c => RANK_VALUES[c.rank]).sort((a, b) => a - b);
      
      // Check all combinations of 3 suited cards
      for (let i = 0; i < suitedValues.length - 2; i++) {
        const span = suitedValues[i + 2] - suitedValues[i];
        // 3-card SF: max gap of 4 (can fill with 2 cards)
        // Examples: Q-T-9 (span=3), J-9-8 (span=3), A-K-J (span=3)
        if (span <= 4) {
          // Found a 3-card straight flush possibility
          const targetValues = [suitedValues[i], suitedValues[i+1], suitedValues[i+2]];
          const sfIndices = cards.map((c, idx) => 
            c.suit === maxSuit && targetValues.includes(RANK_VALUES[c.rank]) ? idx : -1
          ).filter(i => i >= 0);
          return { heldIndices: sfIndices, ev: 0.48 };
        }
      }
    }
    
    // 10. One high card
    if (highCards.length === 1) {
      return { heldIndices: [highCardIndices[0]], ev: 0.36 };
    }
    
    // 11. Nothing - discard all
    return { heldIndices: [], ev: 0.41 };
  }
  
  
  // DEUCES WILD STRATEGY - COMPLETE REWRITE
  else {
    const deuceIndices = cards.map((c, i) => c.rank === '2' ? i : -1).filter(i => i >= 0);
    
    // ========== WITH 4 DEUCES ==========
    if (deuceCount === 4) {
      return { heldIndices: [0,1,2,3,4], ev: 200 }; // Can't improve
    }
    
    // ========== WITH 3 DEUCES ==========
    if (deuceCount === 3) {
      // Wild Royal
      const nonDeuces = cards.filter(c => c.rank !== '2');
      const royalRanks = ['T', 'J', 'Q', 'K', 'A'];
      if (nonDeuces.length === 2 && nonDeuces.every(c => royalRanks.includes(c.rank)) && 
          nonDeuces[0].suit === nonDeuces[1].suit) {
        return { heldIndices: [0,1,2,3,4], ev: 25 };
      }
      
      // Five of a Kind
      if (maxCount === 5) return { heldIndices: [0,1,2,3,4], ev: 15 };
      
      // Hold 3 deuces only (drawing 2 is better than any made hand)
      return { heldIndices: deuceIndices, ev: 7.0 };
    }
    
    // ========== WITH 2 DEUCES ==========
    if (deuceCount === 2) {
      // Wild Royal
      if (isFlush && isStraight && rankValues.includes(14)) {
        return { heldIndices: [0,1,2,3,4], ev: 25 };
      }
      
      // Five of a Kind
      if (maxCount === 5) return { heldIndices: [0,1,2,3,4], ev: 15 };
      
      // Straight Flush
      if (isFlush && isStraight) return { heldIndices: [0,1,2,3,4], ev: 13 };
      
      // Four of a Kind (2 deuces + pair)
      // Hold just the 4 cards to draw for Five of a Kind!
      if (maxCount === 4) {
        // Find the pair rank
        const pairRank = Object.keys(rankCounts).find(r => rankCounts[r] === 2);
        if (pairRank) {
          const indices = [
            ...deuceIndices,
            ...cards.map((c, i) => c.rank === pairRank ? i : -1).filter(i => i >= 0)
          ];
          return { heldIndices: indices, ev: 5.4 }; // Draw for 5K
        }
        // Fallback (shouldn't happen)
        return { heldIndices: [0,1,2,3,4], ev: 5 };
      }
      
      // Four-card Royal Flush (2 deuces + 2 royals suited)
      if (maxSuitCount >= 2) {
        const suitedNonDeuces = cards.filter(c => c.suit === maxSuit && c.rank !== '2');
        const royalRanks = ['T', 'J', 'Q', 'K', 'A'];
        const royalCount = suitedNonDeuces.filter(c => royalRanks.includes(c.rank)).length;
        
        if (royalCount === 2) {
          const indices = [
            ...deuceIndices,
            ...cards.map((c, i) => c.suit === maxSuit && royalRanks.includes(c.rank) ? i : -1).filter(i => i >= 0)
          ].slice(0, 4);
          return { heldIndices: indices, ev: 5.5 };
        }
      }
      
      // Four to SF with 0-2 gaps (2 deuces + 2 suited)
      if (maxSuitCount >= 2) {
        const suitedNonDeuces = cards.filter(c => c.suit === maxSuit && c.rank !== '2');
        if (suitedNonDeuces.length >= 2) {
          const suitedValues = suitedNonDeuces.map(c => RANK_VALUES[c.rank]).sort((a, b) => a - b);
          const span = suitedValues[suitedValues.length - 1] - suitedValues[0];
          
          if (span <= 4) { // 0-2 gaps (2 deuces can fill)
            const indices = [
              ...deuceIndices,
              ...cards.map((c, i) => c.suit === maxSuit && c.rank !== '2' ? i : -1).filter(i => i >= 0)
            ].slice(0, 4);
            return { heldIndices: indices, ev: 4.5 };
          }
        }
      }
      
      // Everything else: hold 2 deuces only
      return { heldIndices: deuceIndices, ev: 3.5 };
    }
    
    // ========== WITH 1 DEUCE ==========
    if (deuceCount === 1) {
      // Wild Royal
      if (isFlush && isStraight && rankValues.includes(14)) {
        return { heldIndices: [0,1,2,3,4], ev: 25 };
      }
      
      // Five of a Kind
      if (maxCount === 5) return { heldIndices: [0,1,2,3,4], ev: 15 };
      
      // Straight Flush
      if (isFlush && isStraight) return { heldIndices: [0,1,2,3,4], ev: 13 };
      
      // Four of a Kind
      if (maxCount === 4) return { heldIndices: [0,1,2,3,4], ev: 5 };
      
      // Full House
      if (maxCount === 3 && secondCount === 2) return { heldIndices: [0,1,2,3,4], ev: 3 };
      
      // Four to Royal Flush (deuce + 3 royals suited)
      if (maxSuitCount >= 3) {
        const suitedNonDeuces = cards.filter(c => c.suit === maxSuit && c.rank !== '2');
        const royalRanks = ['T', 'J', 'Q', 'K', 'A'];
        const royalCount = suitedNonDeuces.filter(c => royalRanks.includes(c.rank)).length;
        
        if (royalCount === 3) {
          const indices = [
            ...deuceIndices,
            ...cards.map((c, i) => c.suit === maxSuit && royalRanks.includes(c.rank) ? i : -1).filter(i => i >= 0)
          ].slice(0, 4);
          return { heldIndices: indices, ev: 3.5 };
        }
      }
      
      // Flush
      if (isFlush) return { heldIndices: [0,1,2,3,4], ev: 3 };
      
      // Three of a Kind (deuce + pair) - BEFORE straight check!
      // Holding deuce + pair (EV 2.2) is better than made straight (EV 2.0)
      if (maxCount === 3) {
        const pairRank = Object.keys(rankCounts).find(r => rankCounts[r] === 2);
        if (pairRank) {
          const indices = [
            ...deuceIndices,
            ...cards.map((c, i) => c.rank === pairRank ? i : -1).filter(i => i >= 0)
          ];
          return { heldIndices: indices, ev: 2.2 };
        }
      }
      
      // Straight
      if (isStraight) return { heldIndices: [0,1,2,3,4], ev: 2 };
      
      // Four to Straight Flush (deuce + 3 suited with straight potential)
      if (maxSuitCount >= 3) {
        const suitedNonDeuces = cards.filter(c => c.suit === maxSuit && c.rank !== '2');
        if (suitedNonDeuces.length >= 3) {
          const suitedValues = suitedNonDeuces.map(c => RANK_VALUES[c.rank]).sort((a, b) => a - b);
          const span = suitedValues[suitedValues.length - 1] - suitedValues[0];
          
          if (span <= 4) { // 0-1 gaps (1 deuce can fill)
            const indices = [
              ...deuceIndices,
              ...cards.map((c, i) => c.suit === maxSuit && c.rank !== '2' ? i : -1).filter(i => i >= 0)
            ].slice(0, 4);
            return { heldIndices: indices, ev: 2.5 };
          }
        }
      }
      
      // Three to Royal Flush (deuce + 2 royals suited)
      if (maxSuitCount >= 2) {
        const suitedNonDeuces = cards.filter(c => c.suit === maxSuit && c.rank !== '2');
        const royalRanks = ['T', 'J', 'Q', 'K', 'A'];
        const royalCount = suitedNonDeuces.filter(c => royalRanks.includes(c.rank)).length;
        
        if (royalCount === 2) {
          const indices = [
            ...deuceIndices,
            ...cards.map((c, i) => c.suit === maxSuit && royalRanks.includes(c.rank) ? i : -1).filter(i => i >= 0)
          ].slice(0, 3);
          return { heldIndices: indices, ev: 2.0 };
        }
      }
      
      // Three to SF with 0 gaps (deuce + 2 suited consecutive)
      if (maxSuitCount >= 2) {
        const suitedNonDeuces = cards.filter(c => c.suit === maxSuit && c.rank !== '2');
        if (suitedNonDeuces.length >= 2) {
          const suitedValues = suitedNonDeuces.map(c => RANK_VALUES[c.rank]).sort((a, b) => a - b);
          const span = suitedValues[suitedValues.length - 1] - suitedValues[0];
          
          if (span === 1) { // Consecutive (0 gaps)
            const indices = [
              ...deuceIndices,
              ...cards.map((c, i) => c.suit === maxSuit && c.rank !== '2' ? i : -1).filter(i => i >= 0)
            ].slice(0, 3);
            return { heldIndices: indices, ev: 1.9 };
          }
        }
      }
      
      // Pair (deuce + pair = trips potential)
      if (pairRanks.length > 0) {
        const indices = [
          ...deuceIndices,
          ...cards.map((c, i) => c.rank === pairRanks[0] ? i : -1).filter(i => i >= 0)
        ];
        return { heldIndices: indices, ev: 1.85 };
      }
      
      // Three to SF with 1 gap (deuce + 2 suited)
      if (maxSuitCount >= 2) {
        const suitedNonDeuces = cards.filter(c => c.suit === maxSuit && c.rank !== '2');
        if (suitedNonDeuces.length >= 2) {
          const suitedValues = suitedNonDeuces.map(c => RANK_VALUES[c.rank]).sort((a, b) => a - b);
          const span = suitedValues[suitedValues.length - 1] - suitedValues[0];
          
          if (span <= 4) { // 1-3 gaps
            const indices = [
              ...deuceIndices,
              ...cards.map((c, i) => c.suit === maxSuit && c.rank !== '2' ? i : -1).filter(i => i >= 0)
            ].slice(0, 3);
            return { heldIndices: indices, ev: 1.8 };
          }
        }
      }
      
      // Four to Flush (deuce + 3 suited)
      if (maxSuitCount >= 3) {
        const indices = [
          ...deuceIndices,
          ...cards.map((c, i) => c.suit === maxSuit && c.rank !== '2' ? i : -1).filter(i => i >= 0)
        ].slice(0, 4);
        return { heldIndices: indices, ev: 1.7 };
      }
      
      // Hold deuce only
      return { heldIndices: deuceIndices, ev: 1.5 };
    }
    
    // ========== WITH 0 DEUCES ==========
    // Royal Flush, Straight Flush, Four of a Kind, Full House
    if (maxCount >= 4) return { heldIndices: [0,1,2,3,4], ev: 25 };
    if (maxCount === 3 && secondCount === 2) return { heldIndices: [0,1,2,3,4], ev: 9 };
    
    // Four to Royal Flush
    if (maxSuitCount >= 4) {
      const suitedRanks = cards.filter(c => c.suit === maxSuit).map(c => c.rank);
      const royalRanks = ['T', 'J', 'Q', 'K', 'A'];
      const royalCount = suitedRanks.filter(r => royalRanks.includes(r)).length;
      if (royalCount === 4) {
        const royalIndices = cards.map((c, i) => c.suit === maxSuit && royalRanks.includes(c.rank) ? i : -1).filter(i => i >= 0);
        return { heldIndices: royalIndices, ev: 2.8 };
      }
    }
    
    // Flush, Straight, Three of a Kind
    if (isFlush) return { heldIndices: [0,1,2,3,4], ev: 6 };
    if (isStraight) return { heldIndices: [0,1,2,3,4], ev: 4 };
    if (maxCount === 3) {
      const tripRank = Object.keys(rankCounts).find(r => rankCounts[r] === 3);
      const tripIndices = cards.map((c, i) => c.rank === tripRank ? i : -1).filter(i => i >= 0);
      return { heldIndices: tripIndices, ev: 3 };
    }
    
    // Four to Straight Flush
    if (maxSuitCount >= 4) {
      const suitedCards = cards.filter(c => c.suit === maxSuit);
      const suitedValues = suitedCards.map(c => RANK_VALUES[c.rank]).sort((a, b) => a - b);
      
      // Check for 4 cards that can make a straight (span <= 4)
      if (suitedValues.length >= 4) {
        for (let i = 0; i <= suitedValues.length - 4; i++) {
          const span = suitedValues[i + 3] - suitedValues[i];
          if (span <= 4) {
            return { heldIndices: suitedIndices.slice(0, 4), ev: 2.6 };
          }
        }
      }
    }
    
    // Three to Royal Flush
    if (maxSuitCount >= 3) {
      const suitedRanks = cards.filter(c => c.suit === maxSuit).map(c => c.rank);
      const royalRanks = ['T', 'J', 'Q', 'K', 'A'];
      const royalCount = suitedRanks.filter(r => royalRanks.includes(r)).length;
      if (royalCount >= 3) {
        const royalIndices = cards.map((c, i) => c.suit === maxSuit && royalRanks.includes(c.rank) ? i : -1).filter(i => i >= 0).slice(0, 3);
        return { heldIndices: royalIndices, ev: 1.2 };
      }
    }
    
    // Pair (hold the higher pair if multiple pairs exist)
    if (pairRanks.length > 0) {
      // Sort pairs by rank value (highest first)
      const sortedPairs = pairRanks.sort((a, b) => RANK_VALUES[b] - RANK_VALUES[a]);
      const pairToHold = sortedPairs[0]; // Hold highest pair
      const pairIndices = cards.map((c, i) => c.rank === pairToHold ? i : -1).filter(i => i >= 0);
      return { heldIndices: pairIndices, ev: 0.8 };
    }
    
    // Four to Flush
    if (maxSuitCount === 4) {
      return { heldIndices: suitedIndices, ev: 0.7 };
    }
    
    // Three to Straight Flush with 0 gaps (consecutive suited)
    if (maxSuitCount >= 3) {
      const suitedCards = cards.filter(c => c.suit === maxSuit);
      const suitedValues = suitedCards.map(c => RANK_VALUES[c.rank]).sort((a, b) => a - b);
      
      if (suitedValues.length >= 3) {
        for (let i = 0; i <= suitedValues.length - 3; i++) {
          const span = suitedValues[i + 2] - suitedValues[i];
          if (span === 2) { // Consecutive (e.g., 7-8-9)
            const targetValues = [suitedValues[i], suitedValues[i+1], suitedValues[i+2]];
            const sfIndices = cards.map((c, idx) => 
              c.suit === maxSuit && targetValues.includes(RANK_VALUES[c.rank]) ? idx : -1
            ).filter(i => i >= 0);
            return { heldIndices: sfIndices, ev: 0.6 };
          }
        }
      }
    }
    
    // Three to Straight Flush with 1 gap
    if (maxSuitCount >= 3) {
      const suitedCards = cards.filter(c => c.suit === maxSuit);
      const suitedValues = suitedCards.map(c => RANK_VALUES[c.rank]).sort((a, b) => a - b);
      
      if (suitedValues.length >= 3) {
        for (let i = 0; i <= suitedValues.length - 3; i++) {
          const span = suitedValues[i + 2] - suitedValues[i];
          if (span === 3) { // 1 gap (e.g., 7-9-T)
            const targetValues = [suitedValues[i], suitedValues[i+1], suitedValues[i+2]];
            const sfIndices = cards.map((c, idx) => 
              c.suit === maxSuit && targetValues.includes(RANK_VALUES[c.rank]) ? idx : -1
            ).filter(i => i >= 0);
            return { heldIndices: sfIndices, ev: 0.55 };
          }
        }
      }
    }
    
    // Discard all
    return { heldIndices: [], ev: 0.45 };
  }
};

    setUltimateXMultipliers(prev => {
      const existing = prev.length > 0 ? prev : [];
      const newMultipliers = Array(playMode).fill(0).map((_, i) => existing[i] || 1);
      
      // Update the multiplier state to show total sum
      const totalMultiplier = newMultipliers.reduce((sum, m) => sum + m, 0);
      setMultiplier(totalMultiplier);
      setMultiplierInput(String(totalMultiplier)); // Also update the input display
      
      return newMultipliers;

    if (userHold !== recommendHold && recommendation.heldIndices.length >= 0) {
      const recommendedCards = recommendation.heldIndices.map(i => firstHand[i].rank + firstHand[i].suit).join(' ');
      const userCards = heldIndices.length > 0 ? heldIndices.map(i => firstHand[i].rank + firstHand[i].suit).join(' ') : 'nothing';
      
      console.log('Showing warning!');
      const warningObj = {
        userCards,
        recommendedCards: recommendedCards || 'Discard all',
        ev: recommendation.ev.toFixed(2)
      };
      console.log('Setting warningMessage to:', warningObj);

      setMistakeWarned(true); // Mark as warned
      return false; // Don't proceed with draw yet
    }
    
    console.log('No mistake detected or matches recommendation');
    return true; // No mistake or matches recommendation
  }, [hands, held, gameType, currentPayTable, playMode, mistakeWarned]);

  const draw = useCallback(() => {
    // Each hand draws from its own independent shuffled deck
    const newHands = hands.map((hand, handIndex) => {
      const deck = shuffleDeck(createDeck());
      // Remove the held cards from this hand's deck
      const heldCardIds = hand.filter((card, idx) => held[handIndex][idx]).map(c => c.id);
      const availableCards = deck.filter(c => !heldCardIds.includes(c.id));
      
      let drawIndex = 0;
      return hand.map((card, cardIndex) => {
        if (held[handIndex][cardIndex]) return card;
        return availableCards[drawIndex++];
      });
    });
    
    const newResults = newHands.map((hand, handIndex) => {
      const result = evaluateHand(hand, gameType, currentPayTable);
      const currentMultiplier = ultimateXMultipliers[handIndex] || 1;
      // Payout = paytable_value × 5 coins × current UltimateX multiplier for this hand
      const winAmount = result.payout * 5 * currentMultiplier;
      return { ...result, winAmount, multiplier: currentMultiplier };
    });
    
    const totalWin = newResults.reduce((sum, r) => sum + r.winAmount, 0);
    setCredits(c => c + totalWin);
    
    // Get Ultimate X multipliers for next hand based on what each hand made
    const newMultipliers = newResults.map(result => {

      // Look up the multiplier for this hand result in the Ultimate X table
      const multiplierTable = ULTIMATE_X_MULTIPLIERS[gameType]?.[payTableVariant];
      if (multiplierTable && multiplierTable[result.hand]) {

      }
      
      // Fallback: if not in table, return 2X for any win
      return 2;
    });
    
    setHands(newHands);
    setResults(newResults);
    setUltimateXMultipliers(newMultipliers);
    setIsDealt(false);
  }, [hands, held, gameType, currentPayTable, multiplier, ultimateXMultipliers, playMode]);

                  </div>
                  
                  {results[handIndex] && (
                    <div style={{textAlign:'center',marginTop: isCompact ? '0.25rem' : '0.5rem'}}>
                      <div style={{fontWeight:700,color:'#FBBF24',fontSize: isCompact ? '0.625rem' : '0.875rem',marginBottom:isCompact ? '0.125rem' : '0.25rem'}}>
                        {results[handIndex].hand}
                      </div>
                      {results[handIndex].payout > 0 ? (
                        <div style={{display:'flex',flexDirection:'column',gap:'0.125rem',alignItems:'center'}}>
                          <div style={{fontSize: isCompact ? '0.5rem' : '0.75rem',color:'rgba(255,255,255,0.6)'}}>
                            {results[handIndex].payout} × 5
                            {results[handIndex].multiplier > 1 && (
                              <span style={{color:'#FF6B6B',fontWeight:700,marginLeft:'0.25rem'}}>
                                × {results[handIndex].multiplier}X
                              </span>
                            )}
                          </div>
                          <div style={{color:'#10B981',fontWeight:800,fontSize: isCompact ? '0.875rem' : '1.125rem'}}>
                            +{results[handIndex].winAmount}
                          </div>
                        </div>
                      ) : (
                        <div style={{fontSize: isCompact ? '0.5rem' : '0.75rem',color:'rgba(255,255,255,0.4)'}}>
                          No win
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
              })}
            </div>
            
            {/* Strategy Warning Banner */}
            {warningMessage && (
              <div style={{
                margin: '0 0 20px 0',
                padding: '20px',
                background: 'linear-gradient(135deg, #f59e0b, #dc2626)',
                borderRadius: '12px',
                border: '3px solid #fbbf24',
                boxShadow: '0 0 20px rgba(251, 191, 36, 0.5)'
              }}>
                <div style={{ textAlign: 'center', color: 'white' }}>
                  <div style={{ fontSize: '24px', fontWeight: 'bold', marginBottom: '10px' }}>
                    ⚠️ STRATEGY WARNING ⚠️
                  </div>
                  <div style={{ fontSize: '16px', marginBottom: '8px' }}>
                    <strong>You're holding:</strong> {warningMessage.userCards}
                  </div>
                  <div style={{ fontSize: '16px', marginBottom: '8px' }}>
                    <strong>Better play:</strong> {warningMessage.recommendedCards}
                  </div>
                  <div style={{ fontSize: '16px', marginBottom: '8px' }}>
                    <strong>Expected Value:</strong> {warningMessage.ev}
                  </div>
                  <div style={{ fontSize: '14px', marginTop: '12px', fontWeight: 'bold' }}>
                    This is not optimal strategy.<br/>
                    Click DRAW again to proceed anyway.
                  </div>
                </div>
              </div>
            )}
            
            {/* Current Hand Multipliers (before dealing) */}
            {!isDealt && ultimateXMultipliers.some(m => m > 1) && (
              <div style={{
                margin: '0 0 20px 0',
                padding: '16px',
                background: 'linear-gradient(135deg, #10b981, #059669)',
                borderRadius: '12px',
                border: '2px solid #34d399',
                boxShadow: '0 0 15px rgba(16, 185, 129, 0.4)'
              }}>
                <div style={{ textAlign: 'center', color: 'white' }}>
                  <div style={{ fontSize: '16px', fontWeight: 'bold', marginBottom: '10px' }}>
                    🎰 ACTIVE MULTIPLIERS 🎰
                  </div>
                  <div style={{ 
                    display: 'grid', 
                    gridTemplateColumns: playMode === 1 ? '1fr' : playMode === 3 ? 'repeat(3, 1fr)' : playMode === 5 ? 'repeat(5, 1fr)' : 'repeat(auto-fit, minmax(60px, 1fr))',
                    gap: '8px',
                    maxWidth: '600px',
                    margin: '0 auto'
                  }}>
                    {ultimateXMultipliers.map((mult, i) => (
                      <div key={i} style={{
                        padding: '8px',
                        background: mult > 1 ? 'rgba(251, 191, 36, 0.3)' : 'rgba(255, 255, 255, 0.15)',
                        borderRadius: '8px',
                        border: mult > 1 ? '2px solid #fbbf24' : '1px solid rgba(255, 255, 255, 0.3)'
                      }}>
                        <div style={{ fontSize: '9px', marginBottom: '2px', opacity: 0.8 }}>
                          Hand {i + 1}
                        </div>
                        <div style={{ 
                          fontSize: mult > 1 ? '22px' : '16px', 
                          fontWeight: 'bold',
                          color: mult > 1 ? '#fbbf24' : 'white'
                        }}>
                          {mult}X
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ fontSize: '11px', marginTop: '10px', opacity: 0.95, fontWeight: 'bold' }}>
                    Sum of Active Multipliers: {multiplier}X
                  </div>
                  <div style={{ fontSize: '10px', marginTop: '4px', opacity: 0.75, fontStyle: 'italic' }}>
                    (This applies to your current hand)
                  </div>
                </div>
              </div>
            )}
            
            {/* Action Buttons */}
            <div className="flex gap-3 justify-center mb-4">
              {!isDealt ? (
                <button
                  onClick={deal}
                  disabled={credits < betAmount}
                  className="btn btn-primary text-lg px-8"
                >
                  DEAL — {playMode > 1 ? `${playMode} × 5 = ` : ''}{betAmount} Credits
                </button>
              ) : (
                <button
                  onClick={attemptDraw}
                  className="btn btn-secondary text-lg px-8"
                >
                  DRAW
                </button>
              )}
            </div>
            
            {/* See Results Button for 5+ hands */}
            {playMode >= 5 && results.length > 0 && (
              <div className="flex justify-center mb-4">
                <button
                  onClick={() => setShowResults(!showResults)}
                  className="btn btn-primary text-base px-6"
                  style={{
                    background: showResults ? 'linear-gradient(135deg, #6366f1, #8b5cf6)' : 'linear-gradient(135deg, #10b981, #059669)'
                  }}
                >
                  {showResults ? '▲ Hide All Results' : `▼ See All ${playMode} Results`}
                </button>
              </div>
            )}
            

          </>
        ) : (
          <>
            {/* Analyzer Mode */}
            <div className="mb-4">

              {/* Game Selection */}
              <div className="mb-3">
                <div className="text-sm font-semibold mb-2 text-yellow-400">GAME:</div>
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                  {Object.keys(PAY_TABLES).map(game => (
                    <button
                      key={game}
                      onClick={() => {
                        setGameType(game);
                        setPayTableVariant(Object.keys(PAY_TABLES[game])[0]);
                        setStrategy(null);
                      }}
                      className={`btn-game ${gameType === game ? 'active' : ''}`}
                    >
                      {game}
                    </button>
                  ))}
                </div>
              </div>

              {/* Pay Table Variant */}
              <div className="mb-3">
                <div className="text-sm font-semibold mb-2 text-yellow-400">PAY TABLE:</div>
                <div className="flex gap-2 flex-wrap">
                  {Object.keys(PAY_TABLES[gameType]).map(variant => (
                    <button
                      key={variant}
                      onClick={() => {
                        if (payTableVariant === variant) {
                          // If already selected, toggle pay table display
                          setShowPayTable(!showPayTable);
                        } else {
                          // Select new variant
                          setPayTableVariant(variant);
                          setStrategy(null);
                          setShowPayTable(false);
                        }
                      }}
                      className={`btn-game ${payTableVariant === variant ? 'active' : ''}`}
                    >
                      {variant}
                    </button>
                  ))}
                </div>
              </div>

              {/* Analyzer Play Mode Selector */}
              <div className="mb-3">
                <div className="text-sm font-semibold mb-2 text-yellow-400">ANALYZING FOR:</div>
                <div className="flex gap-2 flex-wrap">
                  {[1, 3, 5, 10].map(mode => (
                    <button
                      key={mode}
                      onClick={() => {
                        setAnalyzerPlayMode(mode);
                        setStrategy(null); // Clear strategy when changing play mode
                      }}
                      className={`btn-game ${analyzerPlayMode === mode ? 'active' : ''}`}
                      style={{minWidth:'80px'}}
                    >
                      {mode === 1 ? 'Single' : `${mode} Hands`}
                    </button>
                  ))}
                </div>
                <div className="text-xs mt-1 text-gray-400">
                  {analyzerPlayMode > 1 && '⚡ Multi-play favors guaranteed wins and multiplier-earning hands'}
                </div>
              </div>

              {/* Analyzer Multiplier Input */}
              <div className="mb-4">
                <div className="text-sm font-semibold mb-2 text-yellow-400">
                  ACTIVE MULTIPLIER <span style={{fontWeight:400,color:'rgba(255,255,255,0.5)',fontSize:'0.7rem'}}>(sum of multipliers for this hand)</span>
                </div>
                <div className="flex items-center gap-3">
                  <input
                    type="number"
                    min={analyzerPlayMode}
                    max={analyzerPlayMode * 12}
                    value={multiplierInput}
                    onChange={(e) => {
                      const inputVal = e.target.value;
                      // Allow empty string while typing
                      if (inputVal === '') {
                        setMultiplierInput('');
                        return;
                      }
                      // Parse as integer
                      const val = parseInt(inputVal, 10);
                      if (!isNaN(val)) {
                        setMultiplierInput(String(val));
                        setMultiplier(val);
                        setStrategy(null); // Recalculate when multiplier changes
                      }
                    }}
                    onBlur={(e) => {
                      // On blur, ensure we have a valid value
                      const val = parseInt(e.target.value, 10);
                      if (isNaN(val) || val < analyzerPlayMode) {
                        setMultiplierInput(String(analyzerPlayMode));
                        setMultiplier(analyzerPlayMode);
                      }
                    }}
                    className="px-3 py-2 bg-gray-700 text-white rounded text-center font-bold"
                    style={{width: '80px', fontSize: '18px'}}
                  />
                  <span className="text-white text-lg">X</span>
                  <div className="text-xs text-gray-400">
                    {analyzerPlayMode === 1 ? '(3-12 for single hand)' : `(${analyzerPlayMode}-${analyzerPlayMode * 12} for ${analyzerPlayMode} hands)`}
                  </div>
                </div>
                <div className="text-xs mt-1 text-gray-400">
                  💡 Higher multipliers may change optimal strategy
                </div>
              </div>

              <div className="text-sm font-semibold mb-2 text-yellow-400">SELECT 5 CARDS:</div>
              <div className="grid grid-cols-5 gap-2 mb-4">
                {analyzerCards.map((card, index) => {
                  const isRed = card.suit === '♥' || card.suit === '♦';
                  const isRecommended = strategy?.heldIndices.includes(index);
                  return (
                    <div
                      key={index}
                      onClick={() => removeAnalyzerCard(index)}
                      style={{
                        aspectRatio: '2.5/3.5',
                        borderRadius: 8,
                        background: '#fff',
                        color: isRed ? '#dc2626' : '#111827',
                        boxShadow: isRecommended
                          ? '0 0 0 3px #10b981, 0 4px 12px rgba(0,0,0,0.4)'
                          : '0 4px 10px rgba(0,0,0,0.4)',
                        cursor: 'pointer',
                        position: 'relative',
                        display: 'flex',
                        flexDirection: 'column',
                        justifyContent: 'space-between',
                        padding: '4px 5px',
                        userSelect: 'none',
                      }}
                    >
                      <div style={{fontSize:13,fontWeight:800,lineHeight:1,display:'flex',flexDirection:'column',alignItems:'flex-start',gap:1}}>
                        <span>{card.rank}</span>
                        <span style={{fontSize:11}}>{card.suit}</span>
                      </div>
                      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:28,lineHeight:1,pointerEvents:'none'}}>
                        {card.suit}
                      </div>
                      <div style={{fontSize:13,fontWeight:800,lineHeight:1,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1,transform:'rotate(180deg)'}}>
                        <span>{card.rank}</span>
                        <span style={{fontSize:11}}>{card.suit}</span>
                      </div>
                    </div>
                  );
                })}
                {Array(5 - analyzerCards.length).fill(null).map((_, i) => (
                  <div key={`empty-${i}`} style={{aspectRatio:'2.5/3.5',borderRadius:8,background:'rgba(107,114,128,0.3)',border:'2px dashed rgba(255,255,255,0.1)'}}></div>
                ))}
              </div>
              
              <div className="text-xs font-semibold mb-2 text-yellow-400">
                DECK — tap to select (or remove from deck):
              </div>
              <div style={{ maxHeight: 145, overflowY: 'auto', background: 'rgba(0,0,0,0.35)', borderRadius: 8, padding: '5px 3px' }}>
                {SUITS.map(suit => {
                  const suitCards = RANKS.map(rank => ({ rank, suit, id: `${rank}${suit}` }));
                  const isRed = suit === '♥' || suit === '♦';
                  return (
                    <div key={suit} style={{ display: 'flex', gap: 2, marginBottom: 3, alignItems: 'center' }}>
                      <span style={{ color: isRed ? '#ef4444' : '#e2e8f0', fontSize: 11, fontWeight: 700, width: 12, flexShrink: 0, textAlign: 'center' }}>{suit}</span>
                      {suitCards.map(card => {
                        const isSelected = analyzerCards.some(c => c.id === card.id);
                        const isRemoved = removedCards.includes(card.id);
                        return (
                          <div
                            key={card.id}
                            onClick={() => {
                              if (isSelected) return;
                              if (isRemoved) {
                                setRemovedCards(removedCards.filter(id => id !== card.id));
                              } else if (analyzerCards.length < 5) {
                                addAnalyzerCard(card);
                              } else {
                                toggleCardRemoval(card.id);
                              }
                            }}
                            style={{
                              width: 24,
                              height: 34,
                              background: isRemoved ? '#374151' : isSelected ? '#fef9c3' : '#fff',
                              borderRadius: 3,
                              boxShadow: isSelected
                                ? '0 0 0 2px #f59e0b, 0 2px 6px rgba(0,0,0,0.4)'
                                : '0 2px 4px rgba(0,0,0,0.4)',
                              cursor: isSelected ? 'default' : 'pointer',
                              position: 'relative',
                              flexShrink: 0,
                              opacity: isRemoved ? 0.35 : 1,
                              transition: 'all 0.15s ease',
                              display: 'flex',
                              flexDirection: 'column',
                              justifyContent: 'space-between',
                              padding: '2px 2px',
                              color: isRemoved ? '#6b7280' : isRed ? '#dc2626' : '#111827',
                            }}
                          >
                            {/* Top-left rank + suit */}
                            <div style={{ fontSize: 8, fontWeight: 800, lineHeight: 1, display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 0 }}>
                              <span>{card.rank}</span>
                              <span style={{ fontSize: 7 }}>{suit}</span>
                            </div>
                            {/* Center suit */}
                            <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', fontSize: 12, lineHeight: 1 }}>
                              {suit}
                            </div>
                            {/* Bottom-right rank + suit rotated */}
                            <div style={{ fontSize: 8, fontWeight: 800, lineHeight: 1, display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 0, transform: 'rotate(180deg)' }}>
                              <span>{card.rank}</span>
                              <span style={{ fontSize: 7 }}>{suit}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
              
              <div className="flex gap-2 mt-4">
                <button
                  onClick={analyzeHand}
                  disabled={analyzerCards.length !== 5}
                  className="btn btn-primary flex-1"
                >
                  ANALYZE
                </button>
                <button
                  onClick={resetAnalyzer}
                  className="btn btn-game"
                >
                  RESET
                </button>
              </div>
              
              {strategy && (
                <div className="mt-4 bg-black/40 p-4 rounded-lg backdrop-blur">
                  <div className="text-center font-bold text-yellow-400 mb-2">
                    STRATEGY RECOMMENDATION
                  </div>
                  <div className="text-center mb-2">
                    <span className="text-lg font-bold text-green-400">
                      Expected Value: {strategy.ev.toFixed(2)}
                    </span>
                  </div>
                  <div className="text-center text-sm">
                    {strategy.heldIndices.length === 0 ? (
                      <span className="text-red-400">Discard all cards</span>
                    ) : strategy.heldIndices.length === 5 ? (
                      <span className="text-green-400">Hold all cards</span>
                    ) : (
                      <span className="text-blue-400">
                        Hold cards: {strategy.heldIndices.map(i => i + 1).join(', ')}
                      </span>
                    )}
                  </div>
                </div>
              )}
            </div>
          </>
        )}
        
        {/* Pay Table Modal - Available in both Play and Analyzer modes */}
        {showPayTable && (
          <div 
            onClick={() => setShowPayTable(false)}
            style={{
              position: 'fixed',
              top: 0,
              left: 0,
              right: 0,
              bottom: 0,
              background: 'rgba(0,0,0,0.85)',
              backdropFilter: 'blur(8px)',
              zIndex: 1000,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              padding: '1rem',
            }}
          >
            <div
              onClick={e => e.stopPropagation()}
              style={{
                background: 'linear-gradient(135deg, rgba(15,12,41,0.98), rgba(48,43,99,0.98))',
                borderRadius: 16,
                padding: '1.5rem',
                maxWidth: 500,
                width: '100%',
                maxHeight: '80vh',
                overflowY: 'auto',
                border: '2px solid rgba(255,215,0,0.3)',
                boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
              }}
            >
              <div style={{textAlign:'center',marginBottom:'1rem'}}>
                <h3 style={{color:'#FFD700',fontSize:'1.25rem',fontWeight:800,marginBottom:'0.25rem'}}>
                  {gameType}
                </h3>
                <div style={{color:'rgba(255,255,255,0.6)',fontSize:'0.875rem'}}>
                  {payTableVariant} Pay Table
                </div>
              </div>
              
              <div style={{
                background: 'rgba(0,0,0,0.4)',
                borderRadius: 12,
                padding: '0.75rem',
              }}>
                {/* Header Row */}
                <div style={{
                  display: 'grid',
                  gridTemplateColumns: '1fr auto auto',
                  gap: '0.75rem',
                  padding: '0.5rem',
                  borderBottom: '2px solid rgba(255,215,0,0.3)',
                  fontSize: '0.75rem',
                  fontWeight: 700,
                  color: '#FFD700',
                  marginBottom: '0.25rem',
                }}>
                  <span>HAND</span>
                  <span style={{textAlign:'right'}}>PAYOUT</span>
                  <span style={{textAlign:'right'}}>ULT X</span>
                </div>
                
                {Object.entries(currentPayTable).map(([hand, payout]) => {
                  // Get Ultimate X multiplier from mapping
                  const ultXMultiplier = ULTIMATE_X_MULTIPLIERS[gameType]?.[payTableVariant]?.[hand];
                  const ultX = ultXMultiplier ? `${ultXMultiplier}X` : '—';
                  
                  return (
                    <div 
                      key={hand}
                      style={{
                        display: 'grid',
                        gridTemplateColumns: '1fr auto auto',
                        gap: '0.75rem',
                        padding: '0.5rem',
                        borderBottom: '1px solid rgba(255,255,255,0.1)',
                        fontSize: '0.875rem',
                      }}
                    >
                      <span style={{color:'rgba(255,255,255,0.9)'}}>{hand}</span>
                      <span style={{color:'#FFD700',fontWeight:700,textAlign:'right'}}>{payout}</span>
                      <span style={{color:ultX !== '—' ? '#FF6B6B' : 'rgba(255,255,255,0.3)',fontWeight:700,textAlign:'right',minWidth:36}}>{ultX}</span>
                    </div>
                  );
                })}
              </div>
              
              <div style={{textAlign:'center',marginTop:'1rem',fontSize:'0.75rem',color:'rgba(255,255,255,0.5)'}}>
                Payouts shown for 1 coin • 5 coin bet multiplies by 5
              </div>
              
              <button
                onClick={() => setShowPayTable(false)}
                style={{
                  width: '100%',
                  marginTop: '1rem',
                  padding: '0.75rem',
                  background: 'linear-gradient(135deg, #8B5CF6, #6366F1)',
                  color: 'white',
                  border: 'none',
                  borderRadius: 12,
                  fontWeight: 700,
                  fontSize: '0.875rem',
                  cursor: 'pointer',
                }}
              >
                CLOSE
              </button>
            </div>
          </div>
        )}
        
      </div>
    </div>
  );
}
</script></body></html>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ultimate X">
<title>⚡ Ultimate X Poker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; }
</style>
</head>
<body>
<div id="root"><p id="status">Loading React...</p></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
window.onload = function() {
  var s = document.getElementById('status');
  if (typeof React === 'undefined') {
    s.textContent = 'FAIL: React not defined';
    return;
  }
  if (typeof ReactDOM === 'undefined') {
    s.textContent = 'FAIL: ReactDOM not defined';
    return;
  }
  try {
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement('p', null, 'SUCCESS: React ' + React.version + ' is working!')
    );
  } catch(e) {
    s.textContent = 'ERROR: ' + e.message;
  }
};
</script>
</body>
</html>
